name: Build production branch

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pnpm
        run: corepack prepare pnpm@latest --activate

      - name: Install dependencies
        run: pnpm install

      - name: Build production assets
        run: pnpm build

      - name: Deploy production branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p /tmp/build-output
          cp -r dist /tmp/build-output
          git branch -D production || true
          git checkout --orphan production
          git reset --hard
          git clean -fdx
          cp -r /tmp/build-output/dist/. .
          rm -rf /tmp/build-output
          git add .
          git commit -m "Production build from ${{ github.sha }}" || true
          git push --force origin production
